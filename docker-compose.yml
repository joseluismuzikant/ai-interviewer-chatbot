services:
  api:
    build:
      context: ./api
    ports:
      - "8000:8000"
    volumes:
      - ./api/.env:/app/.env
    environment:
      - LLM_PROVIDER=mock

  frontend:
    build:
      context: ./frontend
    ports:
      - "3000:3000"
    volumes:
      - ./frontend/.env:/app/.env
    environment:
      - VITE_API_URL=http://localhost:8000
    depends_on:
      - api
